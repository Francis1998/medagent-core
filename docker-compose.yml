version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medagent-api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/audit.db
    volumes:
      - ./data:/app/data
      - ./results:/app/results
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Optional: lightweight Postgres for production audit log
  # Uncomment and update DATABASE_URL to use Postgres instead of SQLite
  # db:
  #   image: postgres:16-alpine
  #   container_name: medagent-db
  #   environment:
  #     POSTGRES_USER: medagent
  #     POSTGRES_PASSWORD: changeme
  #     POSTGRES_DB: medagent
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U medagent"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  pgdata:
