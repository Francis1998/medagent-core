name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run ruff
        run: ruff check src/

      - name: Run ruff format check
        run: ruff format --check src/

      - name: Run mypy
        run: mypy src/ --ignore-missing-imports

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Build sample KB index
        run: python scripts/ingest_kb.py --sample

      - name: Run tests
        run: pytest tests/ -v --tb=short --timeout=60 --cov=src/medagent --cov-report=xml --cov-report=term-missing
        env:
          # Use no-op values so adapters don't make real API calls in CI
          OPENAI_API_KEY: "sk-test-placeholder"
          ANTHROPIC_API_KEY: "sk-ant-test-placeholder"
          GOOGLE_API_KEY: "test-placeholder"
          KIMI_API_KEY: "test-placeholder"
          PII_HASH_SALT: "ci-test-salt-do-not-use-in-prod"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  eval-smoke:
    name: Eval scripts smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Build sample KB
        run: python scripts/ingest_kb.py --sample

      - name: Run MedQA eval (demo mode)
        run: python scripts/eval_medqa.py --max-samples 3 --output results/medqa_eval_ci.json
        env:
          OPENAI_API_KEY: ""
          ANTHROPIC_API_KEY: ""
          GOOGLE_API_KEY: ""
          KIMI_API_KEY: ""
          PII_HASH_SALT: "ci-test-salt"

      - name: Run DrugBank eval (demo mode)
        run: python scripts/eval_drugbank.py --output results/drugbank_eval_ci.json

      - name: Verify results files created
        run: |
          test -f results/medqa_eval_ci.json && echo "MedQA results OK"
          test -f results/drugbank_eval_ci.json && echo "DrugBank results OK"

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t medagent-core:ci .

      - name: Smoke test container health
        run: |
          docker run -d --name medagent-test \
            -e OPENAI_API_KEY="" \
            -e PII_HASH_SALT="ci-test" \
            -p 8001:8000 \
            medagent-core:ci
          sleep 15
          curl -f http://localhost:8001/health
          docker stop medagent-test
