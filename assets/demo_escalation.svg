<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 332" width="960" height="332" role="img" aria-label="medagent-core - ESCALATE state for low confidence">
<title>medagent-core - ESCALATE state for low confidence</title>
<defs><style>.bg{fill:#0d1117}.bar{fill:#21262d}.title{fill:#8b949e;font:13px monospace}.prompt{fill:#58a6ff;font:700 13px monospace}.text{fill:#e6edf3;font:13px monospace}.dim{fill:#8b949e;font:12px monospace}.ok{fill:#3fb950;font:700 13px monospace}.warn{fill:#d29922;font:700 13px monospace}.err{fill:#f85149;font:700 13px monospace}.violet{fill:#d2a8ff;font:700 13px monospace}.box{fill:#161b22;stroke:#30363d;stroke-width:1}.line{animation:fade .3s both}@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}@keyframes pulse{50%{opacity:.45}}.pulse{animation:pulse 1.2s infinite}.cursor{fill:#58a6ff;animation:pulse 1s infinite}</style></defs>
<rect width="960" height="332" rx="12" class="bg"/>
<rect width="960" height="36" rx="12" class="bar"/>
<circle cx="20" cy="18" r="7" fill="#ff5f57"/><circle cx="42" cy="18" r="7" fill="#ffbd2e"/><circle cx="64" cy="18" r="7" fill="#28c840"/>
<text x="480" y="23" text-anchor="middle" class="title">medagent-core - ESCALATE state for low confidence</text>
<rect x="24" y="56" width="912" height="252" rx="10" class="box"/>
<g class="line" style="animation-delay:0.37s"><text x="44" y="86" class="text">Input: 42F fatigue, night sweats, mild lymphadenopathy, no fever, borderline CBC</text></g>
<g class="line" style="animation-delay:0.59s"><text x="44" y="110" class="warn">Retrieval result: mixed evidence, no single diagnosis dominates</text></g>
<g class="line" style="animation-delay:0.81s"><text x="44" y="134" class="violet">#1 lymphoma       score=0.38</text></g>
<g class="line" style="animation-delay:1.03s"><text x="44" y="158" class="violet">#2 viral syndrome score=0.33</text></g>
<g class="line" style="animation-delay:1.25s"><text x="44" y="182" class="violet">#3 autoimmune     score=0.29</text></g>
<g class="line" style="animation-delay:1.47s"><text x="44" y="206" class="prompt">Safety threshold: min_confidence=0.60</text></g>
<g class="line" style="animation-delay:1.69s"><text x="44" y="230" class="err">FSM transition: REASONING -&gt; SAFETY_CHECK -&gt; ESCALATE</text></g>
<g class="line" style="animation-delay:1.91s"><text x="44" y="254" class="err">OUTPUT BLOCKED: insufficient confidence for automated reasoning response</text></g>
<g class="line" style="animation-delay:2.13s"><text x="44" y="278" class="dim">AUDIT: trigger=LOW_CONFIDENCE, score=0.38, threshold=0.60</text></g>
<g class="line" style="animation-delay:2.35s"><text x="44" y="302" class="ok">No false certainty: human review required</text></g>
<rect x="44" y="294" width="9" height="15" rx="2" class="cursor"/>
</svg>
