<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 500" width="940" height="500" font-family="'Fira Code','Cascadia Code',monospace">
<defs><style>
.bg{fill:#09090b}.node{fill:#111827;stroke:#3b82f6;stroke-width:1.5}.node2{fill:#111827;stroke:#f59e0b;stroke-width:1.5}.node3{fill:#111827;stroke:#22c55e;stroke-width:1.5}.txt{fill:#e5e7eb;font-size:12px;font-weight:bold}.dim{fill:#94a3b8;font-size:11px}.b{fill:#60a5fa;font-size:13px;font-weight:bold}.g{fill:#22c55e;font-size:12px;font-weight:bold}.a{fill:#f59e0b;font-size:12px;font-weight:bold}.r{fill:#fb7185;font-size:12px;font-weight:bold}
.s1{animation:in .25s .2s both}.s2{animation:in .25s .5s both}.s3{animation:in .25s .8s both}.s4{animation:in .25s 1.1s both}.s5{animation:in .25s 1.4s both}.s6{animation:in .25s 1.7s both}.s7{animation:in .25s 2s both}.s8{animation:in .25s 2.3s both}.s9{animation:in .25s 2.6s both}.s10{animation:in .25s 2.9s both}
@keyframes in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}@keyframes dash{to{stroke-dashoffset:-40}}.edge{stroke:#64748b;stroke-width:2;fill:none;stroke-dasharray:6 5;animation:dash 1.4s linear infinite}
</style></defs>
<rect width="940" height="500" rx="14" class="bg"/>
<text x="40" y="46" class="b">Explicit finite-state machine  no hidden agent loop</text>
<g class="s1"><rect x="48" y="110" width="120" height="52" rx="12" class="node"/><text x="73" y="142" class="txt">INTAKE</text></g>
<g class="s2"><rect x="220" y="110" width="150" height="52" rx="12" class="node"/><text x="244" y="142" class="txt">EXTRACTION</text></g>
<g class="s3"><rect x="422" y="110" width="150" height="52" rx="12" class="node"/><text x="450" y="142" class="txt">RETRIEVAL</text></g>
<g class="s4"><rect x="624" y="110" width="150" height="52" rx="12" class="node"/><text x="653" y="142" class="txt">REASONING</text></g>
<g class="s5"><rect x="390" y="245" width="165" height="52" rx="12" class="node2"/><text x="420" y="277" class="txt">SAFETY_CHECK</text></g>
<g class="s6"><rect x="658" y="360" width="130" height="52" rx="12" class="node3"/><text x="699" y="392" class="txt">OUTPUT</text></g>
<g class="s7"><rect x="160" y="360" width="145" height="52" rx="12" class="node2"/><text x="190" y="392" class="txt">ESCALATE</text></g>
<g class="s8"><path class="edge" d="M168 136 H220"/><path class="edge" d="M370 136 H422"/><path class="edge" d="M572 136 H624"/><path class="edge" d="M699 162 C699 210 552 210 510 245"/><path class="edge" d="M555 278 C635 302 688 325 708 360"/><path class="edge" d="M390 278 C318 304 266 326 240 360"/></g>
<g class="s9"><rect x="48" y="200" width="260" height="96" rx="10" fill="#111827" stroke="#334155"/><text x="68" y="230" class="g">Every transition logs:</text><text x="68" y="256" class="dim">state · elapsed_ms · error_code</text><text x="68" y="280" class="dim">evidence IDs · safety decision</text></g>
<g class="s10"><rect x="620" y="205" width="250" height="92" rx="10" fill="#111827" stroke="#334155"/><text x="640" y="234" class="a">Guardrail branches:</text><text x="640" y="260" class="dim">timeout ’ ERROR</text><text x="640" y="282" class="dim">low confidence ’ ESCALATE</text><text x="40" y="462" class="r">Clinical AI needs deterministic control flow. medagent-core makes it inspectable.</text></g>
</svg>
