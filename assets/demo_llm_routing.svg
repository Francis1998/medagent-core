<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 500" width="940" height="500" font-family="'Fira Code','Cascadia Code',monospace">
<defs><style>
.bg{fill:#050814}.box{fill:#0f172a;stroke:#334155;stroke-width:1}.txt{fill:#e5e7eb;font-size:13px}.dim{fill:#94a3b8;font-size:12px}.b{fill:#60a5fa;font-size:13px;font-weight:bold}.g{fill:#34d399;font-size:12px;font-weight:bold}.a{fill:#f59e0b;font-size:12px;font-weight:bold}.r{fill:#fb7185;font-size:12px;font-weight:bold}
.s1{animation:in .25s .2s both}.s2{animation:in .25s .7s both}.s3{animation:in .25s 1.2s both}.s4{animation:in .25s 1.7s both}.s5{animation:in .25s 2.2s both}.s6{animation:in .25s 2.7s both}.s7{animation:in .25s 3.2s both}.s8{animation:in .25s 3.7s both}
@keyframes in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}@keyframes glow{50%{stroke:#34d399;filter:drop-shadow(0 0 6px #34d399)}}.glow{animation:glow 1.4s infinite}
</style></defs>
<rect width="940" height="500" rx="14" class="bg"/>
<text x="40" y="45" class="b">MedicalRouter  task-aware LLM routing with failover</text>
<g class="s1"><rect x="40" y="80" width="220" height="320" rx="12" class="box"/><text x="62" y="112" class="b">Incoming tasks</text><text x="62" y="152" class="txt">entity extraction</text><text x="62" y="196" class="txt">drug interaction</text><text x="62" y="240" class="txt">differential dx</text><text x="62" y="284" class="txt">summarization</text><text x="62" y="328" class="txt">fallback needed</text></g>
<g class="s2"><rect x="340" y="80" width="230" height="320" rx="12" class="box glow"/><text x="362" y="112" class="b">Routing policy</text><text x="362" y="152" class="dim">entity ’ fast/cheap</text><text x="362" y="196" class="dim">drug ’ evidence strict</text><text x="362" y="240" class="dim">differential ’ strongest model</text><text x="362" y="284" class="dim">summaries ’ balanced</text><text x="362" y="328" class="dim">timeout ’ next provider</text></g>
<g class="s3"><rect x="650" y="72" width="230" height="68" rx="10" class="box"/><text x="672" y="104" class="txt">GPT-4o</text><text x="784" y="104" class="g">primary</text></g>
<g class="s4"><rect x="650" y="162" width="230" height="68" rx="10" class="box"/><text x="672" y="194" class="txt">Claude 3.5 Sonnet</text><text x="812" y="194" class="g">dx</text></g>
<g class="s5"><rect x="650" y="252" width="230" height="68" rx="10" class="box"/><text x="672" y="284" class="txt">Gemini 1.5 Pro</text><text x="800" y="284" class="a">backup</text></g>
<g class="s6"><rect x="650" y="342" width="230" height="68" rx="10" class="box"/><text x="672" y="374" class="txt">Kimi / Moonshot</text><text x="806" y="374" class="a">fallback</text></g>
<g class="s7"><path d="M260 152 H340" stroke="#60a5fa" stroke-width="2"/><path d="M260 240 H340" stroke="#60a5fa" stroke-width="2"/><path d="M570 196 C615 196 605 196 650 196" stroke="#34d399" stroke-width="2"/><path d="M570 328 C615 328 605 376 650 376" stroke="#f59e0b" stroke-width="2"/><path d="M570 104 H650" stroke="#34d399" stroke-width="2"/></g>
<g class="s8"><text x="40" y="452" class="g"> deterministic adapter contract</text><text x="330" y="452" class="g"> JSON schema validation</text><text x="610" y="452" class="r"> unsafe free-text output rejected</text></g>
</svg>
